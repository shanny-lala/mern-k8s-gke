server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/font-woff2;
    gzip_min_length 1024;

    # Cache des assets statiques (hash dans le nom de fichier)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fichier de healthcheck Nginx (utilisé par le HEALTHCHECK Docker)
    location = /health.html {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Proxy pour le backend API
    location /api/ {
        proxy_pass http://backend-service:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback : toutes les routes inconnues -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactiver l'affichage de la version Nginx dans les erreurs
    server_tokens off;
}
