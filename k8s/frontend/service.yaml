apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mern-app
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
      # nodePort: 30080  # Décommenter pour Minikube
  # type: LoadBalancer   # Pour GKE : crée une IP publique automatiquement
  type: LoadBalancer          # Pour Minikube
